# ===== TRIAD model configuration =====
# Loaded automatically for `--model TRIAD` (file name must match the model name).

# --- Multimodal graph backbone (Sec. IV-D) ---
embedding_size: 64
feat_embed_dim: 64
n_mm_layers: 1          # propagation layers in the content / modality branches
n_layers: 2             # LightGCN propagation layers on the user-item graph
knn_k: 10               # item-item kNN graph degree
mm_image_weight: 0.1    # visual vs. textual weight when fusing the mm_adj graph

learning_rate: [0.0001]
reg_weight: [0.001]
dropout: [0.5]

# --- Self-supervised contrastive view (graph perturbation) ---
cl_weight: [0, 0.01, 0.001, 0.005]
epsilon: [5]            # perturbation magnitude for the contrastive views
lambda1: [0.001]        # weight of the contrastive (InfoNCE) loss
pvn_weight: [0.01]

# --- Within-item dispersion sensor / flow audit (Sec. IV-B, IV-E) ---
lambda_cross: 1.0       # between-modality synergy (cross-modal flow coupling) weight

# --- Resolvability-typed adaptive intent hierarchy (Sec. IV-F, IV-G) ---
intent_depth: 4               # L: number of residual-quantization codebook levels
intent_codebook_size: 128     # entries per codebook level
halt_rate: 1.0                # rate of the fuzziness-typed halting threshold
lambda_div: 0.1               # codebook diversity regularizer weight
depth_gamma: 1.0              # fuzziness penalty in the depth-attention aggregator

# --- Loss weights (Sec. IV-H) ---
beta1: [0.05]           # weight of the dispersion (flow audit / NLL) loss
beta2: [0.05]           # weight of the intent commitment loss


hyper_parameters: ["reg_weight", "learning_rate", 'dropout', 'cl_weight', 'epsilon', 'lambda1', 'pvn_weight', 'beta1', 'beta2']
